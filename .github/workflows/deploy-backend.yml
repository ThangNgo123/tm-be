name: Deploy Backend

on:
  push:
    branches:
      - main

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build image
        run: |
          docker build -t wincorn/tm-be:${{ github.sha }} .

      - name: Push image
        run: |
          docker push wincorn/tm-be:${{ github.sha }}

      - name: Clone infra repo
        run: |
          git clone https://x-access-token:${{ secrets.GH_TOKEN }}@github.com/wincorn/tm-infra.git

      - name: Update image tag
        run: |
          cd tm-infra
          sed -i "s/tag:.*/tag: ${GITHUB_SHA}/" values.yaml

      - name: Commit and push
        run: |
          cd tm-infra

          git config user.name github-actions
          git config user.email github-actions@github.com

          git add .
          git commit -m "update backend image"

          git push
